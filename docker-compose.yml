services:
#alo
  mysql:
    image: mysql:8.4
    container_name: mysql-citt
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cittdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: ventas-api
    depends_on:
      - mysql
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: cittdb
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"

  despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: despachos-api
    depends_on:
      - mysql
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: cittdb
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8081:8081"

  frontend:
    build:
      context: ./front_despacho
    container_name: despacho-front
    depends_on:
      - ventas
      - despachos
    ports:
      - "5173:80"

volumes:
  mysql_data:
