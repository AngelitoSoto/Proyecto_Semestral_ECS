name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'front_despacho/**'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/despacho-front:latest ./front_despacho

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/despacho-front:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/despacho-front:latest

            docker stop despacho-front || true
            docker rm despacho-front || true

            docker run -d \
            --name despacho-front \
            -p 80:80 \
            ${{ secrets.DOCKER_USERNAME }}/despacho-front:latest
