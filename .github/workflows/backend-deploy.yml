name: Deploy Backend
#ola
on:
  push:
    branches:
      - main
    paths:
      - 'back-Ventas_SpringBoot/**'
      - 'back-Despachos_SpringBoot/**'
      - 'docker-compose.yml'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build ventas image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push ventas image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest

      - name: Build despachos image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/despachos-api:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push despachos image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/despachos-api:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy in EC2 with SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "docker pull angelitosoto20/ventas-api:latest",
              "docker pull angelitosoto20/despachos-api:latest",
              "docker stop ventas-api || true",
              "docker rm ventas-api || true",
              "docker stop despachos-api || true",
              "docker rm despachos-api || true",
              "docker run -d --name ventas-api -p 8080:8080 TU_USUARIO/ventas-api:latest",
              "docker run -d --name despachos-api -p 8081:8081 TU_USUARIO/despachos-api:latest"
            ]' \
            --region ${{ secrets.AWS_REGION }}
