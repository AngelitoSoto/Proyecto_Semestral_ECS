name: Deploy Backend

on:
  push:
    branches:
      - deploy
    paths:
      - 'back-Ventas_SpringBoot/**'
      - 'back-Despachos_SpringBoot/**'
      - 'docker-compose.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build ventas image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest ./back-Ventas_SpringBoot/Springboot-API-REST

      - name: Push ventas image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ventas-api:latest

      - name: Build despachos image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/despachos-api:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO

      - name: Push despachos image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/despachos-api:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy in EC2 with SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/app",
              "docker compose pull",
              "docker compose up -d"
            ]' \
            --comment "Deploy backend" \
            --region ${{ secrets.AWS_REGION }}
