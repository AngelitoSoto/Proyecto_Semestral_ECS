server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ventas {
        proxy_pass http://localhost:8080/api/v1/ventas;
    }

    location /api/despachos {
        proxy_pass http://localhost:8081/api/v1/despachos;
    }
}


